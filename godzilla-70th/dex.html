function refreshOwned(){let count=0;monsters.forEach(m=>{const owned=localStorage.getItem(OWN+m.id)==='1';const n=nodeById.get(String(m.id));n?.classList.toggle('owned',owned);if(n)n.setAttribute('aria-label',`${m.name}${owned?'（已養過）':''}`);if(owned)count++});const c=document.getElementById('ownedCount');if(c)c.textContent=`已養過 ${count} / ${monsters.length}`}
monsters.forEach((m,i)=>{const p=pos.get(m.name);const b=document.createElement('button');b.className='node';b.style.left=p.x+'px';b.style.top=p.y+'px';const first=(incoming.get(m.name)||[])[0]||(outgoing.get(m.name)||[])[0];b.style.setProperty('--c',first?branchColor.get(first.a+'→'+first.b):palette[i%palette.length]);b.innerHTML=`<img src="${m.img}" alt="${m.name}"><span class="owned-mark" title="已養過" aria-hidden="true">✓</span>`;b.title=m.name+'｜'+m.jp;b.dataset.name=m.name;b.dataset.id=m.id;b.addEventListener('mouseenter',()=>highlightNetwork(m.name));b.addEventListener('mouseleave',clearHighlight);b.addEventListener('focus',()=>highlightNetwork(m.name));b.addEventListener('blur',clearHighlight);b.addEventListener('click',e=>{e.stopPropagation();location.href='evolution.html#monster-'+m.id});nodes.appendChild(b);nodeById.set(String(m.id),b)});refreshOwned();addEventListener('storage',e=>{if(e.key?.startsWith(OWN))refreshOwned()});addEventListener('focus',refreshOwned);
function connected(name,dir,map,ns,es){for(const e of map.get(name)||[]){const next=dir==='up'?e.a:e.b,k=e.a+'→'+e.b;if(es.has(k))continue;es.add(k);ns.add(next);connected(next,dir,map,ns,es)}}
function routeSet(name){const ns=new Set([name]),es=new Set();connected(name,'up',incoming,ns,es);connected(name,'down',outgoing,ns,es);return{ns,es}}
function highlightNetwork(name){const c=routeSet(name);document.querySelectorAll('.node').forEach(n=>{n.classList.toggle('hovered',n.dataset.name===name);n.classList.toggle('dim',!c.ns.has(n.dataset.name))});document.querySelectorAll('.edge').forEach(e=>{const k=e.dataset.a+'→'+e.dataset.b;e.classList.toggle('hot',c.es.has(k));e.classList.toggle('dim',!c.es.has(k))})}
function clearHighlight(){document.querySelectorAll('.node').forEach(n=>n.classList.remove('hovered','dim'));document.querySelectorAll('.edge').forEach(e=>e.classList.remove('hot','dim'))}
let scale=.65,tx=0,ty=0;const viewport=document.getElementById('viewport'),world=document.getElementById('world'),zoomValue=document.getElementById('zoomValue');function apply(){world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;zoomValue.textContent=Math.round(scale*100)+'%'}function resetView(){scale=Math.min(.82,(viewport.clientWidth-28)/1880,(viewport.clientHeight-28)/1340);tx=(viewport.clientWidth-1880*scale)/2;ty=Math.max(14,(viewport.clientHeight-1340*scale)/2);apply()}function zoomAt(next,cx,cy){const old=scale;scale=Math.max(.32,Math.min(1.6,next));tx=cx-(cx-tx)*(scale/old);ty=cy-(cy-ty)*(scale/old);apply()}
document.getElementById('minus').onclick=()=>zoomAt(scale-.1,viewport.clientWidth/2,viewport.clientHeight/2);document.getElementById('plus').onclick=()=>zoomAt(scale+.1,viewport.clientWidth/2,viewport.clientHeight/2);document.getElementById('reset').onclick=resetView;document.getElementById('wireOff').onclick=()=>{svg.style.display='none';wireOff.classList.add('active');wireOn.classList.remove('active')};document.getElementById('wireOn').onclick=()=>{svg.style.display='block';wireOn.classList.add('active');wireOff.classList.remove('active')};
let pointers=new Map(),drag=false,lastX=0,lastY=0,lastDist=0;viewport.addEventListener('pointerdown',e=>{if(e.target.closest('.node'))return;pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});viewport.setPointerCapture(e.pointerId);if(pointers.size===1){drag=true;lastX=e.clientX;lastY=e.clientY;viewport.classList.add('dragging')}else if(pointers.size===2){const a=[...pointers.values()];lastDist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y)}});viewport.addEventListener('pointermove',e=>{if(!pointers.has(e.pointerId))return;pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});if(pointers.size===1&&drag){tx+=e.clientX-lastX;ty+=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;apply()}else if(pointers.size===2){const a=[...pointers.values()],dist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y),r=viewport.getBoundingClientRect(),cx=(a[0].x+a[1].x)/2-r.left,cy=(a[0].y+a[1].y)/2-r.top;if(lastDist)zoomAt(scale*(dist/lastDist),cx,cy);lastDist=dist}});function endPointer(e){pointers.delete(e.pointerId);if(pointers.size<2)lastDist=0;if(!pointers.size){drag=false;viewport.classList.remove('dragging')}}viewport.addEventListener('pointerup',endPointer);viewport.addEventListener('pointercancel',endPointer);viewport.addEventListener('wheel',e=>{e.preventDefault();const r=viewport.getBoundingClientRect();zoomAt(scale*(e.deltaY<0?1.1:.9),e.clientX-r.left,e.clientY-r.top)},{passive:false});window.addEventListener('resize',resetView);resetView();
</script></body></html>
