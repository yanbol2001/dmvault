<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#080b12"><meta name="color-scheme" content="dark"><title>DMVault｜系統資訊</title><link rel="stylesheet" href="core/css/dmvault-core.css"><link rel="icon" href="icons/icon.svg" type="image/svg+xml"><script src="core/js/config.js"></script><script src="core/js/core.js"></script>
  <script src="core/js/preferences.js"></script><script defer src="core/js/data.js"></script><script defer src="core/js/diagnostics.js"></script>  <script defer src="core/analytics.js"></script>
</head>
<body><a class="skip-link" href="#main-content">跳至主要內容</a><header class="site-header"><a class="brand" href="./"><span class="brand-mark">DV</span><span><strong>DMVault</strong><small>系統資訊</small></span></a><a class="secondary-button compact-button" href="./">返回首頁</a></header>
<main id="main-content"><section class="hero compact-hero"><p class="eyebrow">Developer Information</p><h1>平台完整性檢查</h1><p class="hero-copy">檢查平台核心檔案、作品資料與版本是否同步。這個頁面不會上傳任何裝置資料。</p></section><section class="section"><div class="diagnostic-toolbar"><div class="diagnostic-actions"><button id="run-check" class="secondary-button" type="button">開始檢查</button><button id="copy-report" class="secondary-button compact-button" type="button" disabled>複製報告</button><button id="download-report" class="secondary-button compact-button" type="button" disabled>下載 JSON</button></div><span id="check-time">尚未檢查</span></div><div id="diagnostic-summary" class="diagnostic-summary" aria-live="polite"><article class="overview-card"><span class="overview-label">平台版本</span><strong id="diag-version">—</strong><small>Platform</small></article><article class="overview-card"><span class="overview-label">作品資料</span><strong id="diag-projects">—</strong><small>已載入</small></article><article class="overview-card"><span class="overview-label">更新紀錄</span><strong id="diag-updates">—</strong><small>筆</small></article><article class="overview-card"><span class="overview-label">檢查結果</span><strong id="diag-result">—</strong><small>完整性</small></article></div><div id="diagnostic-list" class="diagnostic-list"></div><details class="build-details"><summary>Build 資訊</summary><pre id="build-json">尚未產生</pre></details></section></main><footer class="site-footer"><div><strong>DMVault</strong><span>Platform v1.0.0-dev26</span></div><div class="footer-meta"><span>作者：紫硯</span><span>系統資訊頁</span></div></footer>
<script>document.addEventListener('DOMContentLoaded',()=>{const $=window.DMVault.$;const button=$('#run-check');const copyButton=$('#copy-report');const downloadButton=$('#download-report');let latestReport=null;const setReportActions=enabled=>{copyButton.disabled=!enabled;downloadButton.disabled=!enabled;};const run=async()=>{window.DMVault.setBusy(button,true,'檢查中…');setReportActions(false);try{const r=await window.DMVaultDiagnostics.runIntegrityCheck();r.client={online:navigator.onLine,serviceWorker:'serviceWorker'in navigator,storage:{preferences:Boolean(window.DMVaultPreferences),dataFallback:window.DMVaultData?.snapshot?.().fallback||[]},userAgent:navigator.userAgent};latestReport=r;$('#diag-version').textContent='v'+r.platformVersion;$('#diag-projects').textContent=String(r.projects);$('#diag-updates').textContent=String(r.updates);$('#diag-result').textContent=r.ok?'正常':'需檢查';$('#diag-result').className=r.ok?'diagnostic-ok':'diagnostic-warning';$('#check-time').textContent='檢查時間：'+window.DMVault.formatDateTime(r.checkedAt);$('#diagnostic-list').innerHTML=r.resources.map(x=>`<article class="diagnostic-row ${x.ok?'ok':'fail'}"><span>${window.DMVault.escapeHtml(x.label)}</span><code>${window.DMVault.escapeHtml(x.path)}</code><strong>${x.ok?'正常':`失敗 ${x.status||''}`}</strong></article>`).join('')+(r.dataError?`<p class="partial-warning">資料檢查：${window.DMVault.escapeHtml(r.dataError)}</p>`:'');$('#build-json').textContent=JSON.stringify(r,null,2);setReportActions(true);window.DMVault.showToast(r.ok?'平台完整性檢查通過':'檢查完成，發現需要處理的項目',{tone:r.ok?'success':'warning'});}catch(e){window.DMVault.reportError(e,'diagnostics');window.DMVault.showToast('完整性檢查失敗',{tone:'error'});}finally{window.DMVault.setBusy(button,false);}};button.addEventListener('click',run);copyButton.addEventListener('click',async()=>{if(!latestReport)return;try{await navigator.clipboard.writeText(JSON.stringify(latestReport,null,2));window.DMVault.showToast('系統報告已複製',{tone:'success'});}catch{window.DMVault.showToast('瀏覽器無法複製，請從 Build 資訊手動複製',{tone:'warning'});}});downloadButton.addEventListener('click',()=>{if(!latestReport)return;const blob=new Blob([JSON.stringify(latestReport,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const link=document.createElement('a');link.href=url;link.download=`dmvault-system-report-${latestReport.platformVersion}.json`;link.click();setTimeout(()=>URL.revokeObjectURL(url),1000);});run();});</script><div class="toast" id="app-toast" role="status" aria-live="polite" hidden></div></body></html>
